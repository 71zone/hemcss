<!doctype html>
<html lang="en" data-theme="hanoi-light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hemcss demo</title>
  <link rel="stylesheet" href="../../packages/hemcss/dist/hemcss.css" />
  <link rel="stylesheet" href="../../packages/hemcss/dist/themes/hanoi-light.css" />
  <link rel="stylesheet" href="../../packages/hemcss/dist/themes/hanoi-dark.css" />
  <link rel="stylesheet" href="../../packages/hemcss/dist/themes/saigon-light.css" />
  <link rel="stylesheet" href="../../packages/hemcss/dist/themes/saigon-dark.css" />
  <style>
    body { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    h1 { color: var(--hem-text-highlighted); font-size: 2rem; margin-bottom: 0.25rem; }
    h2 { color: var(--hem-text-highlighted); font-size: 1.25rem; margin: 2rem 0 0.75rem; }
    h3 { color: var(--hem-text-toned);       font-size: 1rem;    margin: 1rem 0 0.5rem; }
    p.lede { color: var(--hem-text-muted); margin-bottom: 1.5rem; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    header.top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header class="top">
    <div>
      <h1>hemcss</h1>
      <p class="lede">Semantic components, OKLCH tokens, zero Tailwind dependency.</p>
    </div>
    <button id="theme-toggle" class="btn btn-outline">Toggle theme</button>
  </header>

  <h2>Buttons — variants</h2>
  <div class="row">
    <button class="btn">Default</button>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-warning">Warning</button>
    <button class="btn btn-error">Error</button>
    <button class="btn btn-neutral">Neutral</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-outline">Outline</button>
    <button class="btn btn-link">Link</button>
  </div>

  <h2>Buttons — sizes</h2>
  <div class="row">
    <button class="btn btn-primary btn-xs">xs</button>
    <button class="btn btn-primary btn-sm">sm</button>
    <button class="btn btn-primary">md</button>
    <button class="btn btn-primary btn-lg">lg</button>
  </div>

  <h2>Buttons — states</h2>
  <div class="row">
    <button class="btn btn-primary is-loading">Loading</button>
    <button class="btn btn-primary is-disabled">Disabled class</button>
    <button class="btn btn-primary" disabled>Disabled attr</button>
  </div>

  <h2>Cards</h2>
  <div class="grid">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title">Default card</h3>
        <p>Bg-elevated surface, subtle border, rounded box radius.</p>
        <div class="card-actions">
          <button class="btn btn-primary btn-sm">Action</button>
          <button class="btn btn-ghost btn-sm">Cancel</button>
        </div>
      </div>
    </div>
    <div class="card card-bordered">
      <div class="card-body">
        <h3 class="card-title">Bordered</h3>
        <p>Uses <code>--hem-border-accented</code> for stronger edge.</p>
      </div>
    </div>
    <div class="card card-compact">
      <div class="card-body">
        <h3 class="card-title">Compact</h3>
        <p>Tighter padding.</p>
      </div>
    </div>
  </div>

  <h2>Inputs</h2>
  <div class="row">
    <input class="input" placeholder="Default" />
    <input class="input input-bordered" placeholder="Bordered" />
    <input class="input input-ghost" placeholder="Ghost" />
  </div>
  <div class="row">
    <input class="input input-sm" placeholder="sm" />
    <input class="input" placeholder="md" />
    <input class="input input-lg" placeholder="lg" />
  </div>
  <div class="row">
    <input class="input is-invalid" placeholder="is-invalid" />
    <input class="input is-disabled" placeholder="is-disabled" disabled />
    <input class="input" type="email" placeholder="native :invalid (type email)" />
  </div>

  <script>
    // Cycle through all four style+color combinations.
    const order = ['hanoi-light', 'hanoi-dark', 'saigon-light', 'saigon-dark']
    const toggle = document.getElementById('theme-toggle')
    toggle.addEventListener('click', () => {
      const cur  = document.documentElement.dataset.theme || 'hanoi-light'
      const next = order[(order.indexOf(cur) + 1) % order.length]
      document.documentElement.dataset.theme = next
      toggle.textContent = next
    })
    toggle.textContent = document.documentElement.dataset.theme
  </script>
</body>
</html>
