<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <g transform="translate(4, 5.5)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="5" cy="17" r="4" stroke-width="1.8"/>
    <circle cx="5" cy="17" r="0.8" fill="white" stroke="none"/>
    <!-- Front wheel -->
    <circle cx="20" cy="17" r="4" stroke-width="1.8"/>
    <circle cx="20" cy="17" r="0.8" fill="white" stroke="none"/>
    <!-- Frame -->
    <path d="M5 17 L9 8 L16 6 L20 10 L20 17" stroke-width="1.8"/>
    <!-- Seat -->
    <path d="M8 9 L15 7" stroke-width="2.5"/>
    <!-- Handlebar -->
    <path d="M19 9 L22 5" stroke-width="1.8"/>
    <!-- Headlight -->
    <circle cx="22.5" cy="5" r="1" fill="white" stroke="none"/>
  </g>
</svg>
