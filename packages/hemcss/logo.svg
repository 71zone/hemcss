<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="80" height="80" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <g transform="translate(10, 14)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="12" cy="40" r="9.5" stroke-width="4"/>
    <circle cx="12" cy="40" r="2" fill="white" stroke="none"/>
    <!-- Front wheel -->
    <circle cx="49" cy="40" r="9.5" stroke-width="4"/>
    <circle cx="49" cy="40" r="2" fill="white" stroke="none"/>
    <!-- Frame -->
    <path d="M12 40 L22 19 L40 14 L49 24 L49 40" stroke-width="4"/>
    <!-- Seat -->
    <path d="M20 21 L37 16" stroke-width="6"/>
    <!-- Handlebar -->
    <path d="M47 22 L54 12" stroke-width="3.5"/>
    <!-- Headlight -->
    <circle cx="55" cy="11" r="2.5" fill="white" stroke="none"/>
  </g>
</svg>
