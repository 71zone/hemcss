<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Icon mark scaled to 48×48 -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <g transform="translate(6, 8.4)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="7.2" cy="24" r="5.7" stroke-width="2.4"/>
    <circle cx="7.2" cy="24" r="1.2" fill="white" stroke="none"/>
    <!-- Front wheel -->
    <circle cx="29.4" cy="24" r="5.7" stroke-width="2.4"/>
    <circle cx="29.4" cy="24" r="1.2" fill="white" stroke="none"/>
    <!-- Frame -->
    <path d="M7.2 24 L13.2 11.4 L24 8.4 L29.4 14.4 L29.4 24" stroke-width="2.4"/>
    <!-- Seat -->
    <path d="M12 12.6 L22.2 9.6" stroke-width="3.6"/>
    <!-- Handlebar -->
    <path d="M28.2 13.2 L32.4 7.2" stroke-width="2.1"/>
    <!-- Headlight -->
    <circle cx="33" cy="6.6" r="1.5" fill="white" stroke="none"/>
  </g>
  <!-- Wordmark -->
  <text x="60" y="33" style="font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;font-size:28px;letter-spacing:-0.02em">
    <tspan fill="#06b6d4">Hẻm</tspan><tspan fill="#e2e8f0">CSS</tspan>
  </text>
</svg>
